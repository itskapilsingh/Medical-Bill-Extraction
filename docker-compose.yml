services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-billing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-billing}
      POSTGRES_DB: ${POSTGRES_DB:-billing}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-billing} -d ${POSTGRES_DB:-billing}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  api:
    build: ./backend
    # Invoke through bash so the migration runs regardless of the file's
    # executable bit (which git on some platforms does not preserve).
    command: ["bash", "scripts/migrate.sh", "python", "main.py"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      # PDFs are shared with the worker via a named volume (not a host bind mount):
      # Docker initializes it from the image, so it inherits the non-root appuser's
      # ownership and stays writable, and PHI never lands in the host working tree.
      - pdf_data:/app/pdfs
    ports:
      - "8000:8000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build: ./backend
    command: python worker.py
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file: .env
    volumes:
      - pdf_data:/app/pdfs
    restart: on-failure
    # The worker drains on SIGTERM (finishes the in-flight job, stops claiming).
    # Give it room to do so before Compose escalates to SIGKILL; a job that runs
    # past this is force-killed and picked up by crash recovery on restart.
    stop_grace_period: 40s
    deploy:
      replicas: 2

  # Next.js + Better Auth frontend. Talks to the API server-to-server over the
  # compose network (api:8000); the browser only ever hits this service on :3000.
  web:
    build: ./frontend
    command: node server.js
    env_file: .env
    environment:
      # Reach the API over the internal compose network, not localhost.
      API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: on-failure

volumes:
  postgres_data:
  pdf_data:
