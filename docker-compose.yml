services:
  postgres:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-billing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-billing}
      POSTGRES_DB: ${POSTGRES_DB:-billing}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-billing} -d ${POSTGRES_DB:-billing}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:5432:5432"

  api:
    build: ./backend
    command: ["bash", "scripts/migrate.sh", "python", "main.py"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    volumes:
      - pdf_data:/app/pdfs
    ports:
      - "127.0.0.1:8000:8000"
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build: ./backend
    command: python worker.py
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    env_file: .env
    volumes:
      - pdf_data:/app/pdfs
    restart: on-failure
    stop_grace_period: 40s
    deploy:
      replicas: 2

  web:
    build:
      context: ./frontend
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:?API_INTERNAL_URL is required}
        AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:?AUTH_DATABASE_URL is required}
        BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
        BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL is required}
        TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:?TRUSTED_ORIGINS is required}
    command: node server.js
    env_file: .env
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:?API_INTERNAL_URL is required}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:?AUTH_DATABASE_URL is required}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    restart: on-failure

volumes:
  postgres_data:
  pdf_data:
