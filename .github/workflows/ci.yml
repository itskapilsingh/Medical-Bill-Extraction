name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + RLS integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: billing
          POSTGRES_PASSWORD: billing
          POSTGRES_DB: billing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U billing -d billing"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_CONNECTION_STRING: postgresql+asyncpg://billing:billing@localhost:5432/billing
      APP_DB_CONNECTION_STRING: postgresql+asyncpg://billing_app:billing_app@localhost:5432/billing
      OPENAI_API_KEY: test-key
      BETTER_AUTH_SECRET: test-secret-do-not-use-in-prod
      REQUIRE_DB: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Provision Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Unit tests (no database)
        run: uv run pytest tests/unit -q

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Integration tests (RLS isolation + HTTP lifecycle)
        run: uv run pytest tests/integration -q

  frontend:
    name: Frontend (lint + unit + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_TELEMETRY_DISABLED: "1"
      BETTER_AUTH_SECRET: build-time-placeholder
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build
